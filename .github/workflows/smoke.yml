name: Smoke Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify supported Node.js version
        run: node scripts/check-node-version.js

      # Blocking gate: fail the build if a known secret pattern is committed.
      - name: Secret scan
        run: npm run scan:secrets

      # Strict gate: any lint error or warning fails the build (P2-9).
      - name: Lint server code
        run: npm run lint:strict

      # Informational for now; blocking audit gate is a follow-up (see EXECUTION-TRACKER P2-5).
      - name: Dependency vulnerability audit (non-blocking)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run smoke tests
        run: npm run test:smoke
