<!-- take_quiz.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Take Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="canonical" href="https://hellouniversity.online">
  <meta name="google-adsense-account" content="ca-pub-4537208011192461">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Welcome to HelloUniversity, your one-stop student grading portal. Simplify grade management, enhance transparency, and access grades efficiently on any device.">
  <!-- Google Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/ustyles.css">
  <script src="js/uscripts.js"></script>
  <link rel="stylesheet" href="/dist/output.css">
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
  
  <!-- Header -->
  <header class="bg-green-600 text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">HelloUniversity - Taking Quiz</h1>
    <a href="#" class="hover:underline" onclick="window.close()">Close</a>
  </header>
  
  <!-- Main container -->
  <main class="container mx-auto p-4 flex-grow">
    <!-- Quiz Title and Description -->
    <div>
      <h2 id="quizTitle" class="text-2xl font-semibold"></h2>
      <p id="quizDescription" class="text-gray-700 mb-4"></p>
    </div>

    <!-- Timer (optional) -->
    <div id="timerDisplay" class="text-red-600 font-bold mb-4"></div>

    <form id="quizForm" class="space-y-4"></form>

    <!-- Actions -->
    <div class="flex items-center gap-3 mb-4">
      <button id="submitBtn" type="button" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Submit</button>
      <span id="status" class="text-sm text-gray-600"></span>
    </div>

    <!-- Result Container (hidden until after submission) -->
    <div id="resultContainer" class="hidden bg-white shadow p-4 rounded">
      <h3 class="text-xl font-semibold mb-2">Quiz Results</h3>
      <p>Your Score: <span id="scoreValue"></span> out of <span id="scoreTotal"></span></p>
      <button onclick="window.close()" class="mt-4 bg-green-600 text-white px-3 py-1 rounded">Close Window</button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-800 text-white p-4 text-center">
    <p class="text-sm">&copy; 2026 HelloUniversity. All rights reserved.</p>
  </footer>

  <!-- take_quiz.js -->
  <script src="/js/take_quiz.js"></script>
</body>
</html>
