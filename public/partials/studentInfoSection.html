<!-- studentInfoSection.html -->
<div id="studentInfoSection" class="mb-6 border p-4 rounded shadow">
    <h2 class="font-semibold text-xl mb-4">Step 1: Enter Your Information</h2>
    
    <!-- Student ID -->
    <div class="mb-3">
      <label for="studentId" class="block mb-1">Student ID Number:</label>
      <input 
        type="text" 
        id="studentId" 
        name="studentId" 
        required 
        class="border p-2 w-full"
        placeholder="e.g. 2512345" 
      />
    </div>
  
    <!-- First/Last Name side by side -->
    <div class="mb-3 grid grid-cols-2 gap-2">
      <div>
        <label for="firstName" class="block mb-1">First Name:</label>
        <input 
          type="text" 
          id="firstName" 
          name="firstName" 
          required 
          class="border p-2 w-full"
          placeholder="e.g. John"
        />
      </div>
      <div>
        <label for="lastName" class="block mb-1">Last Name:</label>
        <input 
          type="text" 
          id="lastName" 
          name="lastName" 
          required 
          class="border p-2 w-full"
          placeholder="e.g. Doe"
        />
      </div>
    </div>
  
    <!-- Email Address -->
    <div class="mb-3">
      <label for="emailAddress" class="block mb-1">Email Address:</label>
      <input 
        type="email" 
        id="emailAddress" 
        name="emailAddress" 
        required 
        class="border p-2 w-full"
        placeholder="e.g. johndoe@example.com"
      />
    </div>
  
    <!-- Course Dropdown -->
    <div class="mb-3">
      <label for="courseSelect" class="block mb-1">Course:</label>
      <select 
        id="courseSelect" 
        name="courseSelect" 
        required 
        class="border p-2 w-full"
      >
        <option value="" disabled selected>Select your course</option>
        <option value="BPA">BPA</option>
        <option value="BSND">BSND</option>
        <option value="BSFT">BSFT</option>
        <option value="others">Others</option>
      </select>
    </div>
    <div class="mb-3 hidden" id="otherCourseContainer">
      <label for="otherCourse" class="block mb-1">Please specify your course:</label>
      <input 
        type="text"
        id="otherCourse"
        name="otherCourse"
        class="border p-2 w-full"
        placeholder="e.g. BS Nursing"
      />
    </div>
  
    <!-- Section Dropdown -->
    <div class="mb-3">
      <label for="sectionSelect" class="block mb-1">Section:</label>
      <select 
        id="sectionSelect" 
        name="sectionSelect" 
        required 
        class="border p-2 w-full"
      >
        <option value="" disabled selected>Select your section</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
        <option value="others">Others</option>
      </select>
    </div>
    <div class="mb-3 hidden" id="otherSectionContainer">
      <label for="otherSection" class="block mb-1">Please specify your section:</label>
      <input 
        type="text"
        id="otherSection"
        name="otherSection"
        class="border p-2 w-full"
        placeholder="e.g. E-Block2"
      />
    </div>
  
  <!-- Button to proceed -->
  <button 
    id="nextButton"
    class="bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700"
  >
    Proceed to Quiz
  </button>
  </div>
