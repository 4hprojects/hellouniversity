        <h1 class="text-2xl font-bold text-center mb-6">IT 114 - Final Project Submission</h1>
    
        <!-- Submission Form -->
        <form id="submissionForm" class="max-w-2xl mx-auto bg-white shadow-md rounded-lg p-6 space-y-4">
    
            <!-- Team Member 1 -->
            <div>
                <label class="block font-medium">Team Member 1 - Full Name</label>
                <input type="text" name="team_member1" required class="input-field">
            </div>
            <div>
                <label class="block font-medium">Team Member 1 - ID Number</label>
                <input type="text" name="id_member1" required class="input-field">
            </div>
    
            <!-- Team Member 2 -->
            <div>
                <label class="block font-medium">Team Member 2 - Full Name</label>
                <input type="text" name="team_member2" required class="input-field">
            </div>
            <div>
                <label class="block font-medium">Team Member 2 - ID Number</label>
                <input type="text" name="id_member2" required class="input-field">
            </div>
    
            <!-- Group Number -->
            <div>
                <label class="block font-medium">Group Number</label>
                <input type="number" name="group_number" min="1" required class="input-field">
            </div>
    
            <!-- Section -->
            <div>
                <label class="block font-medium">Section</label>
                <select name="section" id="sectionSelect" required class="input-field">
                    <option value="">Select Section</option>
                    <option value="A">Section A</option>
                    <option value="B">Section B</option>
                </select>
            </div>
    
            <!-- Email -->
            <div>
                <label class="block font-medium">Email</label>
                <input type="email" name="email" required class="input-field">
            </div>
    
            <!-- Project Selection -->
            <div>
                <label class="block font-medium">Project Name</label>
                <select name="project_name" required class="input-field">
                    <option value="">Select a Project</option>
                    <option value="100 Prisoners Puzzle">100 Prisoners Puzzle</option>
                    <option value="Dots and Boxes">Dots and Boxes</option>
                    <option value="Game of Life">Game of Life</option>
                    <option value="Gomoku">Gomoku</option>
                    <option value="Minesweeper">Minesweeper</option>
                    <option value="Reverse TicTacToe">Reverse TicTacToe</option>
                    <option value="SOS">SOS</option>
                    <option value="Sudoku">Sudoku</option>
                    <option value="Tower of Hanoi">Tower of Hanoi</option>
                    <option value="Word Search">Word Search</option>
                </select>
            </div>
    
            <!-- Schedule Selection -->
            <!--div>
                <label class="block font-medium">Presentation Schedule</label>
                <select name="schedule" id="scheduleSelect" required class="input-field">
                    <option value="">Select a Schedule</option>
                    <-- Dynamically filled by JavaScript>
                </select>
            </div--->
    
            <!-- File Upload -->
            <div>
                <label class="block font-medium">Upload Project (.zip, max 50MB)</label>
                <input type="file" id="fileUpload" name="file" accept=".zip" required class="input-field">
                <p id="fileError" class="text-red-500 text-sm mt-1 hidden">Invalid file. Only .zip allowed (max 50MB).</p>
            </div>
    
            <!-- Upload Progress -->
            <div id="progressContainer" class="hidden">
                <p class="text-sm text-gray-600">Uploading...</p>
                <div class="w-full bg-gray-200 h-3 rounded">
                    <div id="progressBar" class="bg-green-600 h-3 rounded" style="width: 0%;"></div>
                </div>
            </div>
    
            <!-- Submit Button -->
            <button type="submit" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 w-full">
                Submit Project
            </button>
    
            <!-- Success Message -->
            <p id="successMessage" class="text-green-600 text-center mt-2 hidden">Submission Successful!</p>
        </form>
