<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Quizzes</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="/css/ustyles.css">
    <!-- Scroll Reveal and Smooth Scrolling -->
    <link rel="stylesheet" href="/dist/output.css">
    <script src="https://unpkg.com/scrollreveal" defer></script>
    <script src="/js/uscripts.js" defer></script>
    <link rel="stylesheet" href="/css/view_quizzes.css">
</head>
<body class="bg-gray-100 font-poppins">
    <!-- Header -->
    <header class="sticky top-0 z-50 flex items-center justify-between px-4 py-2 bg-green-600 text-white">
        <div class="flex items-center">
            <a href="/">
                <img src="/images/hellouniversity-new-icon.webp" alt="HelloUniversity Icon" class="h-12 mr-3">
            </a>
            <h1 class="text-xl font-bold">HelloUniversity</h1>
        </div>
        <nav>
            <ul id="navMenu" class="flex flex-row gap-4">
                <li><a href="#" title="Search" onclick="toggleSearchOverlay()" class="cursor-pointer"><span class="material-icons">search</span></a></li>          
                <li><a href="/dashboard" title="Dashboard"><span class="material-icons">dashboard</span></a></li>
                <li><a href="/activities" title="Quiz"  class="text-yellow-400"><span class="material-icons">quiz</span></a></li>
                <li><a href="/attendance" title="Attendance Summary"><span class="material-icons">assignment</span></a></li>
                <li><a id="logoutLink" href="/login" title="Sign Out"><span class="material-icons">logout</span></a></li>
            </ul>
        </nav>
    </header>
    
    <main>
            <!-- Welcome Section -->
    <section class="welcome-section bg-white shadow-md p-4 rounded-lg mx-auto my-4 max-w-md">
        <!-- Combined Welcome and Dropdown -->
        <div class="welcome-dropdown">
            <h2 id="userGreeting" class="text-gray-700"></h2>

            <select id="classesSelect" class="w-full mt-2 mb-4 p-2 border border-gray-300 rounded">
                <!-- Options will be dynamically populated -->
            </select>
        </div>
    </section>
        <section>
            <div>
                <h2 id="userGreeting" class="text-gray-700"></h2>
            </div>
        </section>
        <!-- Section for displaying quizzes -->
        <section id="quizzesSection">
            <h2>All Quizzes</h2>
            <table id="quizzesTable" class="styled-table">
                <thead>
                    <tr>
                        <th>Quiz Title</th>
                        <th>Description</th>
                        <th>Number of Questions</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Quizzes will be dynamically loaded here -->
                </tbody>
            </table>
        </section>

        <!-- Quiz Modal -->
        <div id="quizModal" class="modal hidden">
            <div class="modal-content">
                <h3 id="quizTitle">Quiz Title</h3>
                <p id="quizDescription">Quiz Description</p>
                <form id="quizForm">
                    <ul id="quizQuestions">
                        <!-- Questions will be dynamically populated -->
                    </ul>
                    <button type="submit" class="btn-submit">Submit</button>
                </form>
                <button id="closeQuizModal" class="btn-close">Close</button>
            </div>
        </div>
        <div id="quizSummary" class="hidden p-4 bg-gray-200 rounded-lg mt-4"></div>

    </main>
    <script src="/js/view_quizzes.js"></script>
    <footer id="footer"></footer>
</body>
</html>
