<!-- Add this near the end of your body, outside the main panels -->
<div id="loginModal" class="modal" style="display:none;">
  <div class="modal-content">
    <h2>Login</h2>
    <form id="loginForm" autocomplete="off">
      <input type="text" id="loginUsername" placeholder="Username" required autocomplete="username">
      <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
      <button type="submit" class="btn btn-primary">Login</button>
      <div id="loginError" class="error-message" aria-live="polite"></div>
    </form>
  </div>
</div>
