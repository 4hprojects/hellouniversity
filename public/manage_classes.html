<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Manage Classes (Admin/Teacher)</title>
  <link rel="stylesheet" href="/dist/output.css">
</head>
<body class="bg-gray-100 text-gray-800">

  <header class="bg-green-600 text-white p-4">
    <h1 class="text-2xl font-bold">Manage Classes</h1>
  </header>

  <main class="max-w-5xl mx-auto p-4">
    <!-- Classes Table -->
    <section class="bg-white p-4 rounded shadow">
      <h2 class="text-xl font-semibold mb-4">All Classes</h2>
      <table class="w-full bg-white border">
        <thead class="bg-gray-200">
          <tr>
            <th class="p-2 border">Class Code</th>
            <th class="p-2 border">Class Name</th>
            <th class="p-2 border">Schedule</th>
            <th class="p-2 border">Time</th>
            <th class="p-2 border">Actions</th>
          </tr>
        </thead>
        <tbody id="classesTbody"></tbody>
      </table>
    </section>
  </main>

  <!-- Quizzes Pop-up (Overlay) -->
  <div
    id="quizzesModal"
    class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center"
  >
    <div class="bg-white p-4 rounded shadow max-w-md w-full relative">
      <button
        class="absolute top-2 right-2 text-gray-600"
        onclick="closeQuizzesModal()"
      >
        X
      </button>
      <h3 class="text-xl font-bold mb-2">Assign Quizzes to <span id="modalClassName"></span></h3>
      <div id="quizzesList" class="max-h-64 overflow-y-auto mb-4"></div>
      <button
        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700"
        onclick="saveQuizAssignments()"
      >
        Save
      </button>
    </div>
  </div>

  <!-- Students Pop-up (Overlay) -->
  <div
    id="studentsModal"
    class="fixed inset-0 bg-black bg-opacity-50 hidden justify-center items-center"
  >
    <div class="bg-white p-4 rounded shadow max-w-md w-full relative">
      <button
        class="absolute top-2 right-2 text-gray-600"
        onclick="closeStudentsModal()"
      >
        X
      </button>
      <h3 class="text-xl font-bold mb-2">Manage Students for <span id="studentModalClassName"></span></h3>
      <div class="mb-4">
        <input
          type="text"
          id="studentIdsInput"
          class="border border-gray-300 p-2 w-full"
          placeholder="Enter student IDs (comma-separated)"
        />
        <button
          class="bg-green-600 text-white px-4 py-1 mt-2 rounded hover:bg-green-700"
          onclick="addStudentsToClass()"
        >
          Add Students
        </button>
      </div>
      <div id="enrolledStudentsList" class="max-h-64 overflow-y-auto mb-4 border p-2">
        <!-- enrolled students will appear here -->
      </div>
    </div>
  </div>

  <script>
    let currentClassId = null;       // track which class we're editing (quizzes/students)
    let currentClassName = '';       // store class name for display
    let allQuizzes = [];             // store all quizzes from server
    let assignedQuizIds = [];        // store quizIds assigned to the current class
    let enrolledStudentIds = [];     // store the student's array for the current class

    document.addEventListener('DOMContentLoaded', async () => {
      // Possibly do session check if needed
      await loadClasses(); 
      await loadAllQuizzes(); // so we know what's available for assignment
    });

    /* ---------- 1. Load Classes into the Table ---------- */
    async function loadClasses() {
      try {
        const res = await fetch('/api/classes', { credentials: 'include' });
        const data = await res.json();
        if (!data.success) {
          console.error('Error fetching classes:', data.message);
          return;
        }
        const tbody = document.getElementById('classesTbody');
        tbody.innerHTML = '';

        if (!data.classes.length) {
          tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center text-gray-500">No classes found.</td></tr>';
          return;
        }

        data.classes.forEach(cls => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td class="p-2 border">${cls.classCode}</td>
            <td class="p-2 border">${cls.className}</td>
            <td class="p-2 border">${cls.schedule || ''}</td>
            <td class="p-2 border">${cls.time || ''}</td>
            <td class="p-2 border text-center">
              <button class="bg-blue-500 text-white px-2 py-1 rounded hover:bg-blue-600"
                      onclick="openQuizzesModal('${cls._id}','${cls.className}')">
                Manage Quizzes
              </button>
              <button class="bg-green-500 text-white px-2 py-1 rounded hover:bg-green-600 ml-2"
                      onclick="openStudentsModal('${cls._id}','${cls.className}')">
                Manage Students
              </button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        console.error('Error loading classes:', err);
      }
    }

    /* ---------- 2. Load All Quizzes Once ---------- */
    async function loadAllQuizzes() {
      try {
        const res = await fetch('/api/quizzes', { credentials: 'include' });
        const data = await res.json();
        if (!data.success) {
          console.error('Error fetching quizzes:', data.message);
          return;
        }
        allQuizzes = data.quizzes; 
        // We'll use this data in the pop-up
      } catch (err) {
        console.error('Error loading quizzes:', err);
      }
    }

    /* ---------- 3. Manage Quizzes Pop-up ---------- */
    function openQuizzesModal(classId, className) {
      currentClassId = classId;
      currentClassName = className;
      document.getElementById('modalClassName').textContent = className;

      // Show overlay
      const modal = document.getElementById('quizzesModal');
      modal.classList.remove('hidden');
      modal.classList.add('flex'); // so it uses "display: flex"

      loadAssignedQuizzes();
    }

    function closeQuizzesModal() {
      const modal = document.getElementById('quizzesModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    /* 3a. Load which quizzes are assigned to the class */
    async function loadAssignedQuizzes() {
      try {
        const res = await fetch(`/api/class-quiz/${currentClassId}`, { credentials: 'include' });
        const data = await res.json();
        if (!data.success) {
          console.error('Error fetching assigned quizzes:', data.message);
          return;
        }
        assignedQuizIds = data.quizIds; // array of quizId strings

        // Render checkboxes
        const listDiv = document.getElementById('quizzesList');
        listDiv.innerHTML = '';

        if (!allQuizzes.length) {
          listDiv.innerHTML = '<p>No quizzes found.</p>';
          return;
        }

        allQuizzes.forEach(qz => {
          const isChecked = assignedQuizIds.includes(qz._id);
          const label = document.createElement('label');
          label.classList.add('block', 'mb-1');
          label.innerHTML = `
            <input type="checkbox" class="mr-2" value="${qz._id}" ${isChecked ? 'checked' : ''} />
            <span>${qz.quizTitle}</span>
          `;
          listDiv.appendChild(label);
        });
      } catch (err) {
        console.error('Error loading assigned quizzes:', err);
      }
    }

    /* 3b. Save quiz assignments (assign or remove) */
    async function saveQuizAssignments() {
      // Gather checkboxes from quizzesList
      const checkboxes = document.querySelectorAll('#quizzesList input[type="checkbox"]');
      const newAssigned = [];
      checkboxes.forEach(cb => {
        if (cb.checked) newAssigned.push(cb.value);
      });

      // We can figure out which are newly assigned vs. removed by comparing `assignedQuizIds`
      // with `newAssigned`. But let's do a simpler approach:
      // 1) Remove all old assignments that are not in newAssigned
      // 2) Add all new assignments that are not in assignedQuizIds

      const toRemove = assignedQuizIds.filter(oldQid => !newAssigned.includes(oldQid));
      const toAdd = newAssigned.filter(newQid => !assignedQuizIds.includes(newQid));

      try {
        // Remove 
        if (toRemove.length > 0) {
          await fetch('/api/class-quiz', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
              classId: currentClassId,
              quizIds: toRemove,
              action: 'remove'
            })
          });
        }
        // Assign
        if (toAdd.length > 0) {
          await fetch('/api/class-quiz', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
              classId: currentClassId,
              quizIds: toAdd,
              action: 'assign'
            })
          });
        }
        alert('Quiz assignments updated.');
        closeQuizzesModal();
      } catch (err) {
        console.error('Error saving quiz assignments:', err);
        alert('An error occurred while saving quiz assignments.');
      }
    }

    /* ---------- 4. Manage Students Pop-up ---------- */
    function openStudentsModal(classId, className) {
      currentClassId = classId;
      currentClassName = className;
      document.getElementById('studentModalClassName').textContent = className;

      const modal = document.getElementById('studentsModal');
      modal.classList.remove('hidden');
      modal.classList.add('flex');

      loadClassStudents();
    }

    function closeStudentsModal() {
      const modal = document.getElementById('studentsModal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
    }

    async function loadClassStudents() {
      try {
        // We expect /api/classes -> a single class doc or /api/classes/:classId
        // or we can re-fetch all classes and find the one by ID
        // For simplicity, let's have a route /api/classes/:classId
        const res = await fetch(`/api/classes/${currentClassId}`, { credentials: 'include' });
        const data = await res.json();
        if (!data.success) {
          console.error('Error fetching class data:', data.message);
          return;
        }
        enrolledStudentIds = data.classDoc.students || [];

        renderEnrolledStudents();
      } catch (err) {
        console.error('Error loading class students:', err);
      }
    }

    function renderEnrolledStudents() {
      const container = document.getElementById('enrolledStudentsList');
      container.innerHTML = '';

      if (!enrolledStudentIds.length) {
        container.innerHTML = '<p class="text-gray-500">No students enrolled.</p>';
        return;
      }

      enrolledStudentIds.forEach(sid => {
        const div = document.createElement('div');
        div.classList.add('mb-1', 'flex', 'justify-between', 'items-center', 'bg-gray-100', 'p-2', 'rounded');
        div.innerHTML = `
          <span>${sid}</span>
          <button class="bg-red-600 text-white px-2 py-1 rounded hover:bg-red-700"
                  onclick="removeStudent('${sid}')">
            Remove
          </button>
        `;
        container.appendChild(div);
      });
    }

    /* 4a. Add Students */
    async function addStudentsToClass() {
      const inputEl = document.getElementById('studentIdsInput');
      const inputVal = inputEl.value.trim();
      if (!inputVal) return;

      const newIDs = inputVal.split(/[\s,]+/);
      if (!newIDs.length) return;

      try {
        const res = await fetch(`/api/classes/${currentClassId}/students`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            studentIDs: newIDs,
            action: 'add'
          })
        });
        const data = await res.json();
        if (data.success) {
          alert('Students added to class.');
          inputEl.value = '';
          loadClassStudents(); // refresh
        } else {
          alert('Error adding students: ' + (data.message || 'Unknown error'));
        }
      } catch (err) {
        console.error('Error adding students:', err);
      }
    }

    /* 4b. Remove Student */
    async function removeStudent(studentId) {
      try {
        const res = await fetch(`/api/classes/${currentClassId}/students`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({
            studentIDs: [studentId],
            action: 'remove'
          })
        });
        const data = await res.json();
        if (data.success) {
          alert('Student removed from class.');
          loadClassStudents();
        } else {
          alert('Error removing student: ' + (data.message || 'Unknown error'));
        }
      } catch (err) {
        console.error('Error removing student:', err);
      }
    }
  </script>
</body>
</html>
