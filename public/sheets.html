<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Data</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #ddd;
        }
        th, td {
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #4caf50;
            color: white;
        }
        .error-message {
            color: red;
            font-size: 16px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Attendance Data</h1>
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Remarks</th>
                <th>Notes</th>
                <th>Term</th>
            </tr>
        </thead>
        <tbody id="data-table-body">
            <!-- Attendance data will be dynamically added here -->
        </tbody>
    </table>
    <div class="error-message" id="attendanceError"></div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const studentIDNumber = localStorage.getItem('studentIDNumber');

            if (!studentIDNumber) {
                alert('No student ID found. Please log in.');
                window.location.href = '/login';
                return;
            }

            async function fetchAttendance(studentID) {
                const apiKey = 'AIzaSyBSZED5vFQinb2Y4GRPkNAIgwa6NY7eOhE';
                const spreadsheetId = '1K9F2W7dmscWCs6jB_FvLJQaArV_DCgChgYtvjAGUKy4';
                const range = 'FullAttendance!A1:E';
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${range}?key=${apiKey}`;

                try {
                    const response = await fetch(url);

                    if (!response.ok) {
                        throw new Error(`HTTP Error ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();

                    if (!data.values) {
                        throw new Error('No data found in the specified range.');
                    }

                    const rows = data.values;
                    const tableBody = document.getElementById('data-table-body');
                    tableBody.innerHTML = ''; // Clear previous rows

                    // Filter rows by student ID
                    rows.slice(1).forEach(row => {
                        if (row[0] === studentID) {
                            const [id, date, time, remarks, notes] = row;
                            const tr = document.createElement('tr');

                            [date, time, remarks, notes].forEach(value => {
                                const td = document.createElement('td');
                                td.textContent = value;
                                tr.appendChild(td);
                            });

                            tableBody.appendChild(tr);
                        }
                    });

                    if (!tableBody.children.length) {
                        tableBody.innerHTML = '<tr><td colspan="4">No matching data found.</td></tr>';
                    }
                } catch (error) {
                    console.error('Error fetching attendance:', error);
                    document.getElementById('attendanceError').textContent = 'Failed to load attendance data. Please try again.';
                }
            }

            fetchAttendance(studentIDNumber);
        });
    </script>
</body>
</html>
